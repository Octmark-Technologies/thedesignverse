<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Designverse</title>
  <script>
    // GitHub Pages SPA redirect: encode the path into a query string
    // and redirect to index.html, which will restore it via history.replaceState
    var segmentCount = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
